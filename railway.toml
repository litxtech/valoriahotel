# Valoria OPS API — monorepo kökünden deploy edildiğinde bu dosya kullanılır.
# Railway'de "Root Directory" = railway-service ise: railway-service/railway.toml kullan
# (veya servis ayarında config path olarak işaretle).
# https://docs.railway.app/guides/config-as-code

[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# npm run yok: ek süreç + stderr uyarıları; doğrudan Node (PORT Railway’den gelir)
startCommand = "node railway-service/dist/app/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
